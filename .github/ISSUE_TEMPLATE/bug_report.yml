name: Bug Report
description: Something is broken or behaving incorrectly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Before filing — check that the [tarkov.dev API](https://api.tarkov.dev) is reachable and returning data.

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Website (index.html)
        - OBS Overlay (overlay.html)
        - Both
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug clearly and concisely.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open ...
        2. Click ...
        3. See error
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser / OBS version
      placeholder: e.g. Chrome 124, OBS 30.1, Firefox 125
    validations:
      required: false

  - type: textarea
    id: console
    attributes:
      label: Console errors (if any)
      description: Open DevTools → Console and paste any errors here.
      render: text
