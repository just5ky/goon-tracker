services:
  goon-tracker:
    build: .
    restart: unless-stopped
    networks:
      - traefik
    labels:
      - "traefik.enable=true"

      # HTTP → HTTPS redirect
      - "traefik.http.routers.goon-tracker-http.rule=Host(`goons.yourdomain.com`)"
      - "traefik.http.routers.goon-tracker-http.entrypoints=web"
      - "traefik.http.routers.goon-tracker-http.middlewares=redirect-https"

      # HTTPS
      - "traefik.http.routers.goon-tracker.rule=Host(`goons.yourdomain.com`)"
      - "traefik.http.routers.goon-tracker.entrypoints=websecure"
      - "traefik.http.routers.goon-tracker.tls=true"
      - "traefik.http.routers.goon-tracker.tls.certresolver=letsencrypt"

      # Service port
      - "traefik.http.services.goon-tracker.loadbalancer.server.port=80"

      # Redirect middleware (may already exist in your Traefik setup)
      - "traefik.http.middlewares.redirect-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.redirect-https.redirectscheme.permanent=true"

networks:
  traefik:
    external: true
