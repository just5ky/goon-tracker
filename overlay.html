<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Goon Tracker — Overlay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="overlay.css" />
</head>
<body>
  <div id="overlay">
    <div id="overlay-topbar">
      <div class="ot-dots">
        <span class="ot-dot r"></span>
        <span class="ot-dot g"></span>
      </div>
      <span class="ot-title">PMC TACTICAL FEED</span>
      <span id="mode-indicator"></span>
    </div>
    <div id="overlay-body">
      <img id="goon-image" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt="Goon" />
      <div id="info">
        <div id="map-name"></div>
        <div id="last-seen"></div>
        <div id="tarkov-time">
          <span class="tarkov-server-label">☽</span><span id="tarkov-left">--:--</span>
          <span class="tarkov-sep"> / </span>
          <span class="tarkov-server-label">☀</span><span id="tarkov-right">--:--</span>
        </div>
      </div>
    </div>
  </div>
  <script src="overlay.js"></script>
</body>
</html>
